<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Plated</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Plated">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#171615">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23171615'/%3E%3Ctext x='90' y='126' font-family='Georgia,serif' font-size='120' fill='%238B9B73' text-anchor='middle'%3EP%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.webmanifest">

<style>
  :root{
    --bg:#171615; --surface:#22211E; --raised:#2B2A26;
    --text:#F3F1EB; --muted:#AAA79E; --divider:#37352F;
    --sage:#8B9B73; --sage-dim:#6f7d5c; --amber:#BB8B43; --terracotta:#A55E4C; --moss:#6F8B67;
    --radius-card:20px; --radius-chip:999px; --space-page:20px; --tap:48px; --motion:180ms;
    --serif:"Cormorant Garamond",Georgia,"Iowan Old Style",serif;
    --sans:"Montserrat",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg)}
  body{
    font-family:var(--sans); color:var(--text); background:var(--bg);
    padding-bottom:calc(74px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased; line-height:1.4;
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .wrap{max-width:680px;margin:0 auto;padding:0 var(--space-page)}
  button{font-family:inherit}
  a{color:var(--sage)}

  /* Top bar */
  .topbar{
    position:sticky;top:0;z-index:20;background:rgba(23,22,21,.92);backdrop-filter:blur(8px);
    padding:calc(12px + env(safe-area-inset-top)) var(--space-page) 12px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--divider);
  }
  .brand{font-family:var(--serif);font-size:25px;font-weight:500;letter-spacing:1.5px;color:var(--text);display:flex;align-items:center;gap:9px}
  .brand .mono{color:var(--sage)}
  .screen-title{font-family:var(--serif);font-size:25px;font-weight:400;letter-spacing:.4px}
  .planctl{
    background:var(--raised);border:1px solid var(--divider);color:var(--text);
    font-size:13px;font-weight:600;border-radius:var(--radius-chip);padding:8px 14px;appearance:none;
    max-width:160px;
  }
  .planctl option{color:#111;background:#eee}

  /* Bottom nav */
  nav.tabs{
    position:fixed;bottom:0;left:0;right:0;z-index:30;background:var(--surface);
    border-top:1px solid var(--divider);display:flex;padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabs button{
    flex:1;background:none;border:none;padding:14px 4px;cursor:pointer;color:var(--muted);
    display:flex;align-items:center;justify-content:center;min-height:56px;
  }
  nav.tabs button svg{width:24px;height:24px;display:block}
  nav.tabs button[aria-current="page"]{color:var(--sage)}
  .ic-sm{width:16px;height:16px;vertical-align:-3px}
  .ic-lg{width:30px;height:30px}
  .brand svg{color:var(--sage)}
  .btn svg.ic-sm,.seg button svg.ic-sm{margin-right:2px}

  main{padding-top:22px;min-height:60vh}

  /* Generic */
  .muted{color:var(--muted)}
  .section-label{font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
  .card{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius-card);overflow:hidden}
  .stack>*+*{margin-top:12px}
  .btn{background:var(--sage);color:#15170f;border:none;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
  .btn:disabled{opacity:.5}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--divider)}
  .btn.mini{width:auto;padding:9px 14px;font-size:13px;border-radius:12px}
  .btn.danger{background:transparent;color:var(--terracotta);border:1px solid var(--terracotta)}
  .btn.danger.mini{width:auto;padding:9px 14px;font-size:13px;border-radius:12px}
  .row-between{display:flex;align-items:center;justify-content:space-between;gap:12px}

  /* Today */
  .today-head{padding:6px 0 2px}
  .today-weekday{font-family:var(--serif);font-size:38px;line-height:1.04;font-weight:400;letter-spacing:.3px;margin:0}
  .today-date{color:var(--muted);font-size:14px;margin:3px 0 0}
  .theme-tag{display:inline-block;margin-top:10px;background:rgba(139,155,115,.14);color:var(--sage);border:1px solid rgba(139,155,115,.3);
    font-size:12px;font-weight:600;padding:4px 11px;border-radius:var(--radius-chip)}
  .context-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:16px 0 8px}
  .context-row .wk{font-size:13px;color:var(--muted);font-weight:600}
  .context-row .now{color:var(--amber)}
  .daynav{display:flex;align-items:center;gap:8px}
  .chevbtn{background:var(--raised);border:1px solid var(--divider);color:var(--text);width:38px;height:38px;border-radius:12px;font-size:16px;cursor:pointer}
  .fab{position:fixed;right:20px;bottom:calc(84px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;
    background:var(--sage);color:#15170f;border:none;display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 18px rgba(0,0,0,.4);cursor:pointer;z-index:25}
  .fab svg{width:26px;height:26px;stroke-width:2.2}

  .meal-row{
    display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;
    background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius-card);
    padding:16px;cursor:pointer;color:var(--text);min-height:var(--tap);
  }
  .meal-row:active{background:var(--raised)}
  .meal-row .slot{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
  .meal-row .name{font-family:var(--serif);font-size:22px;font-weight:500;margin-top:2px;line-height:1.15;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .meal-row .name.empty{font-family:var(--sans);color:var(--muted);font-weight:500;font-size:16px}
  .meal-row .glyph{color:var(--muted);font-size:15px;flex:0 0 auto}
  .meal-row .add{color:var(--sage);font-size:14px;font-weight:600;flex:0 0 auto}

  /* Plan week list */
  .wkpills{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px}
  .wkpills::-webkit-scrollbar{display:none}
  .wkpill{flex:0 0 auto;background:var(--surface);border:1px solid var(--divider);color:var(--text);
    border-radius:14px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
  .wkpill[aria-pressed="true"]{background:var(--sage);color:#15170f;border-color:var(--sage)}
  .wkpill .nowdot{color:var(--amber);font-size:10px;margin-left:5px;font-weight:700}
  .wkpill[aria-pressed="true"] .nowdot{color:#3a3a20}

  /* Food thumbnails */
  .thumb{width:54px;height:54px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;background:var(--raised);border:1px solid var(--divider)}
  .thumb .thumb-ic{width:26px;height:26px;stroke-width:1.5;color:var(--sage)}
  .thumb.sm{width:34px;height:34px;border-radius:9px}
  .thumb.sm .thumb-ic{width:18px;height:18px}
  .t-taco{background:linear-gradient(135deg,#2c2419,#3a2c1a)} .t-taco .thumb-ic{color:var(--amber)}
  .t-pizza{background:linear-gradient(135deg,#2e211c,#3a241c)} .t-pizza .thumb-ic{color:#c67c5f}
  .t-pasta{background:linear-gradient(135deg,#2b2519,#37301d)} .t-pasta .thumb-ic{color:#c9a24e}
  .t-soup{background:linear-gradient(135deg,#232720,#2c332a)} .t-soup .thumb-ic{color:var(--moss)}
  .t-sandwich{background:linear-gradient(135deg,#2b2419,#372c1c)} .t-sandwich .thumb-ic{color:var(--amber)}
  .t-breakfast{background:linear-gradient(135deg,#2d2a1e,#3a3421)} .t-breakfast .thumb-ic{color:#d8b45e}
  .t-salad{background:linear-gradient(135deg,#232a20,#2b352a)} .t-salad .thumb-ic{color:var(--moss)}
  .t-dessert{background:linear-gradient(135deg,#2d2320,#3a2a24)} .t-dessert .thumb-ic{color:#c98f6a}
  .t-leftovers{background:linear-gradient(135deg,#26251f,#302f27)} .t-leftovers .thumb-ic{color:var(--muted)}
  .t-seafood,.t-chicken{background:linear-gradient(135deg,#242a26,#2e352f)} .t-seafood .thumb-ic,.t-chicken .thumb-ic{color:var(--sage)}
  .t-beef{background:linear-gradient(135deg,#2b221f,#372723)} .t-beef .thumb-ic{color:#b06b54}
  .t-plate{background:linear-gradient(135deg,#26261f,#2f2f26)} .t-plate .thumb-ic{color:var(--sage)}
  .empty-thumb .thumb-ic,.empty-thumb{opacity:.3}

  /* Week day rows (mockup style: abbrev · dinner · thumb · chevron) */
  .dayrow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:var(--surface);border:1px solid var(--divider);border-radius:16px;padding:11px 14px;cursor:pointer;color:var(--text);min-height:var(--tap)}
  .dayrow:active{background:var(--raised)}
  .dayrow .dow{font-size:13px;font-weight:600;color:var(--muted);width:36px;flex:0 0 auto}
  .dayrow .drow-name{flex:1;font-family:var(--serif);font-size:18px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dayrow .drow-name.add{font-family:var(--sans);color:var(--sage);font-weight:500;font-size:15px}
  .dayrow .chev{color:var(--muted);flex:0 0 auto;display:flex}
  .dayrow .chev svg{width:18px;height:18px}
  .mr-txt{min-width:0;flex:1;display:flex;flex-direction:column}

  .dessert-card{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius-card);padding:16px;cursor:pointer}
  .dessert-card .lab{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;gap:6px}
  .dessert-card .nm{font-family:var(--serif);font-size:20px;font-weight:500;margin-top:5px}
  .dessert-card .nm.empty{font-family:var(--sans);color:var(--muted);font-weight:500;font-size:15px}

  /* Month overview grid */
  .mweek{margin-bottom:16px;background:var(--surface);border:1px solid var(--divider);border-radius:16px;padding:12px 12px 14px}
  .mweek.cur{border-color:var(--sage)}
  .mweek-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;padding:0 2px}
  .mweek-h .t{font-size:14px;font-weight:600}
  .mweek.cur .t{color:var(--sage)}
  .mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .mcell{background:none;border:none;padding:0;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
  .mcell-d{font-size:10px;font-weight:600;color:var(--muted)}
  .mcell .thumb.sm{width:100%;height:38px;border-radius:9px}
  .btn.text{background:none;border:none;color:var(--sage);width:auto;padding:6px 2px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:2px;cursor:pointer}
  .btn.text svg{width:16px;height:16px}

  /* Full-screen panel (detail + editor) */
  .panel{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
  .panel.show{display:flex}
  .panel-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:calc(12px + env(safe-area-inset-top)) var(--space-page) 12px;border-bottom:1px solid var(--divider);background:var(--surface)}
  .panel-bar .pt{font-size:16px;font-weight:600}
  .panel-bar button{background:none;border:none;color:var(--sage);font-size:15px;font-weight:600;cursor:pointer;padding:6px}
  .panel-body{flex:1;overflow-y:auto;padding:20px var(--space-page) calc(30px + env(safe-area-inset-bottom))}

  .hero{height:172px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;border:1px solid var(--divider)}
  .hero .hero-ic{width:62px;height:62px;stroke-width:1.3;opacity:.9}
  .bullets{list-style:disc;padding-left:20px;margin:0}
  .bullets li{padding:3px 0;font-size:16px}
  .side-chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:4px;background:var(--raised);border:1px solid var(--divider);color:var(--text);border-radius:var(--radius-chip);padding:7px 13px;font-size:13px;font-weight:500}
  .chip.side{background:rgba(187,139,67,.14);border-color:rgba(187,139,67,.4);color:var(--amber)}
  .chip.side.add{cursor:pointer;padding:7px 11px}
  .chip.side.add svg{width:14px;height:14px}
  .recipe-row{display:flex;align-items:center;gap:10px;width:100%;background:var(--surface);border:1px solid var(--divider);border-radius:12px;padding:13px 14px;color:var(--text);cursor:pointer;text-decoration:none;font-size:15px;text-align:left}
  .recipe-row .rr-main{flex:1}
  .recipe-row .rr-pg{color:var(--muted);font-size:13px}
  .recipe-row.add{color:var(--sage)}
  .recipe-row svg{flex:0 0 auto;width:18px;height:18px}
  .info-card{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius-card);padding:16px;cursor:pointer;color:var(--text)}
  .info-card .lab{font-size:11px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px}
  .info-card .nm{font-size:15px;margin-top:6px;white-space:pre-wrap}
  .info-card .nm.empty{color:var(--muted)}
  /* Bottom-sheet modal */
  .modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:70;display:none;align-items:flex-end;justify-content:center}
  .modal-wrap.show{display:flex}
  .modal{background:var(--surface);width:100%;max-width:680px;border-radius:20px 20px 0 0;border-top:1px solid var(--divider);
    padding:18px 20px calc(24px + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto;animation:sheetup .22s ease}
  @keyframes sheetup{from{transform:translateY(30px);opacity:.5}to{transform:translateY(0);opacity:1}}
  .modal h3{font-family:var(--serif);font-weight:400;font-size:23px;margin:0 0 4px}
  .modal .msub{color:var(--muted);font-size:13px;margin:0 0 16px}
  .swap-day{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;background:var(--raised);border:1px solid var(--divider);border-radius:12px;padding:12px 14px;margin-bottom:8px;color:var(--text);cursor:pointer;font-size:15px;font-weight:500;text-align:left}
  .swap-day .sd-name{color:var(--muted);font-size:13px;font-weight:400;font-family:var(--serif)}
  .detail-title{font-family:var(--serif);font-size:32px;font-weight:400;letter-spacing:.3px;margin:2px 0 2px}
  .detail-ctx{color:var(--muted);font-size:13px;margin-bottom:20px}
  .detail-sec{margin-top:22px}
  .detail-sec h4{font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin:0 0 10px}
  .ing-list{list-style:none;margin:0;padding:0}
  .ing-list li{padding:9px 0;border-bottom:1px solid var(--divider);font-size:16px}
  .ing-list li:last-child{border-bottom:none}
  .ing-list li.side{color:var(--amber)}
  .ing-list li.side::before{content:"+ ";color:var(--amber)}
  .recipe-box{background:var(--surface);border:1px solid var(--divider);border-radius:14px;padding:14px}
  .recipe-box a{font-weight:600;text-decoration:none}
  .cookbook{color:var(--amber);font-weight:600;font-size:16px}
  .notes-box{white-space:pre-wrap;font-size:15px;color:var(--text);background:var(--surface);border:1px solid var(--divider);border-radius:14px;padding:14px}

  /* Editor form */
  label.fl{display:block;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:20px 0 7px}
  label.fl:first-of-type{margin-top:4px}
  .inp{width:100%;background:var(--surface);border:1px solid var(--divider);border-radius:12px;padding:13px 14px;font-size:16px;font-family:inherit;color:var(--text)}
  .inp:focus{outline:2px solid var(--sage);outline-offset:1px}
  textarea.inp{resize:vertical;min-height:80px;line-height:1.5}
  .fhint{font-size:12px;color:var(--muted);margin:6px 2px 0}
  .field-err{color:var(--terracotta);font-size:13px;margin:6px 2px 0;display:none}
  .field-err.show{display:block}
  .seg{display:flex;background:var(--raised);border-radius:12px;padding:4px;gap:4px;margin-top:2px}
  .seg button{flex:1;border:none;background:none;padding:11px;border-radius:9px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--surface);color:var(--text);box-shadow:0 1px 0 rgba(0,0,0,.3)}
  .editor-actions{margin-top:26px;display:flex;flex-direction:column;gap:10px}

  .empty-state{text-align:center;color:var(--muted);padding:40px 20px;font-size:15px;line-height:1.6}
  .empty-state .big{font-size:30px;display:block;margin-bottom:10px}
  .stub{text-align:center;padding:56px 24px;color:var(--muted)}
  .stub .big{font-size:34px;display:block;margin-bottom:12px}
  .stub h3{color:var(--text);font-family:var(--serif);font-size:24px;margin:0 0 8px}

  /* Grocery */
  .gfilter{display:flex;gap:8px;margin-bottom:14px}
  .fchip{background:var(--surface);border:1px solid var(--divider);color:var(--muted);border-radius:var(--radius-chip);padding:7px 15px;font-size:13px;font-weight:600;cursor:pointer}
  .fchip[aria-pressed="true"]{background:var(--raised);color:var(--text);border-color:var(--sage)}
  .glist{display:flex;flex-direction:column;gap:8px}
  .gitem{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);border:1px solid var(--divider);border-radius:14px;padding:12px 14px}
  .gitem.got{opacity:.55}
  .gitem.got .gname{text-decoration:line-through}
  .ginfo{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;cursor:pointer}
  .gname{font-size:15px;font-weight:500}
  .gname .cnt{color:var(--muted);font-weight:600;font-size:13px}
  .gname .ck{color:var(--moss);margin-right:4px}
  .used{font-size:11.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .gstat{display:flex;gap:5px;flex:0 0 auto}
  .sb{border:1px solid var(--divider);background:transparent;color:var(--muted);border-radius:9px;padding:7px 9px;font-size:11px;font-weight:700;cursor:pointer;min-width:36px;min-height:34px}
  .sb.out.on{background:var(--terracotta);border-color:var(--terracotta);color:#fff}
  .sb.low.on{background:var(--amber);border-color:var(--amber);color:#241a08}
  .sb.got.on{background:var(--moss);border-color:var(--moss);color:#12210f}
  .completed-h{font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin:20px 0 8px;padding-top:14px;border-top:1px solid var(--divider)}
  .buildtag{display:inline-block;background:rgba(139,155,115,.14);border:1px solid rgba(139,155,115,.3);color:var(--sage);
    font-size:12px;font-weight:600;letter-spacing:.4px;padding:5px 12px;border-radius:var(--radius-chip)}
  .buildtag strong{font-weight:700}

  .toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--raised);color:var(--text);
    border:1px solid var(--divider);padding:11px 18px;border-radius:14px;font-size:14px;font-weight:600;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
</style>
</head>
<body>

<div class="topbar">
  <div id="topLeft" class="brand"><span class="mono">P</span>lated</div>
  <select class="planctl" id="planCtl" aria-label="Active plan" onchange="onPlanCtl(this.value)"></select>
</div>

<main class="wrap" id="view" role="main"></main>

<nav class="tabs" aria-label="Primary">
  <button id="nav-today" onclick="nav('today')" aria-current="page" aria-label="Today"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.7 12 4l9 6.7"/><path d="M5.5 9.6V20h13V9.6"/></svg></button>
  <button id="nav-week" onclick="nav('week')" aria-label="Week"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15" rx="2.5"/><path d="M3.5 9.5h17M8 3.5v3M16 3.5v3M7.5 14h9"/></svg></button>
  <button id="nav-month" onclick="nav('month')" aria-label="Month"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15" rx="2.5"/><path d="M3.5 9.5h17M8 3.5v3M16 3.5v3"/><path d="M8 13h.01M12 13h.01M16 13h.01M8 16.5h.01M12 16.5h.01M16 16.5h.01" stroke-width="2.3"/></svg></button>
  <button id="nav-grocery" onclick="nav('grocery')" aria-label="Groceries"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2l1.8 10.2a1.4 1.4 0 0 0 1.4 1.1h8.2a1.4 1.4 0 0 0 1.4-1.1L20 7.5H6.2"/><circle cx="9" cy="19.5" r="1.2"/><circle cx="17" cy="19.5" r="1.2"/></svg></button>
  <button id="nav-more" onclick="nav('more')" aria-label="More"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="5.5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="18.5" cy="12" r="1.4"/></svg></button>
</nav>

<!-- Full-screen panel for meal detail / editor -->
<div class="panel" id="panel" role="dialog" aria-modal="true" aria-labelledby="panelTitle">
  <div class="panel-bar">
    <button id="panelBack" onclick="closePanel()">‹ Back</button>
    <span class="pt" id="panelTitle"></span>
    <button id="panelAction" onclick="panelActionClick()"></button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<div class="modal-wrap" id="modalWrap" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox" role="dialog" aria-modal="true"></div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<div class="sr" id="live" aria-live="polite"></div>

<script>
/* ============================================================
   PLATED — Batch 1: shell, Today, Plan, meal detail + editor
   ============================================================ */
const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const DAY_ABBR={Monday:"Mon",Tuesday:"Tue",Wednesday:"Wed",Thursday:"Thu",Friday:"Fri",Saturday:"Sat",Sunday:"Sun"};
const SLOTS=["breakfast","lunch","dinner"];
const SLOT_LABEL={breakfast:"Breakfast",lunch:"Lunch",dinner:"Dinner"};
const KEY="platedData_v1";
const OLD_KEY="mealPlannerData_v1";
const SCHEMA=1;
const BUILD="Thyme";            // build codeword — bump on each shipped change
const BUILD_DATE="Jul 23, 2026";

/* ---- inline line icons (no emoji anywhere) ---- */
function svg(inner,cls){return `<svg class="${cls||'ic-sm'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${inner}</svg>`;}
const IC={
  link:svg('<path d="M9.5 14.5 14.5 9.5"/><path d="M11 7.5l1-1a3.4 3.4 0 0 1 4.8 4.8l-1 1"/><path d="M13 16.5l-1 1a3.4 3.4 0 0 1-4.8-4.8l1-1"/>'),
  book:svg('<path d="M4 5.5A1.8 1.8 0 0 1 5.8 4H11v15H5.8A1.8 1.8 0 0 0 4 20.3z"/><path d="M20 5.5A1.8 1.8 0 0 0 18.2 4H13v15h5.2a1.8 1.8 0 0 1 1.8 1.3z"/>'),
  pencil:svg('<path d="M13.5 5.5l3 3"/><path d="M4.5 20l1-4 9.5-9.5 3 3L8.5 19z"/>'),
  plus:svg('<path d="M12 5v14M5 12h14"/>'),
  plusC:svg('<circle cx="12" cy="12" r="8.2"/><path d="M12 8.5v7M8.5 12h7"/>'),
  down:svg('<path d="M12 4v10M8 10.5l4 4 4-4"/><path d="M5 19.5h14"/>'),
  up:svg('<path d="M12 15V5M8 8.5l4-4 4 4"/><path d="M5 19.5h14"/>'),
  copy:svg('<rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/>'),
  chevL:svg('<path d="M14.5 6l-6 6 6 6"/>'),
  chevR:svg('<path d="M9.5 6l6 6-6 6"/>'),
  check:svg('<path d="M5 12.5l4.5 4.5L19 7"/>'),
  x:svg('<path d="M6 6l12 12M18 6L6 18"/>'),
  basket:svg('<path d="M5 9h14l-1.3 10.2a1.4 1.4 0 0 1-1.4 1.3H7.7a1.4 1.4 0 0 1-1.4-1.3z"/><path d="M9 9 12 4l3 5"/>','ic-lg'),
  dessert:svg('<path d="M5 13h14l-1.4 6.5a1.4 1.4 0 0 1-1.4 1.1H7.8a1.4 1.4 0 0 1-1.4-1.1z"/><path d="M8 13a4 4 0 0 1 8 0"/><path d="M12 6v3"/>'),
  swap:svg('<path d="M7 8h11l-3-3M17 16H6l3 3"/>'),
  note:svg('<rect x="4.5" y="4.5" width="15" height="15" rx="2.5"/><path d="M8 9h8M8 12.5h8M8 16h5"/>')
};
const LOGO_MARK=`<svg viewBox="0 0 40 40" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <path d="M14 6v28"/><path d="M11 6v6M14 6v6M17 6v6"/><path d="M11 12c0 2 6 2 6 0"/>
  <path d="M21 8h4a7 7 0 0 1 0 14h-4"/></svg>`;

function uid(){return "id_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7);}
function nowISO(){return new Date().toISOString();}

/* ---- seed content (from user's Notes) ---- */
const B_L={
  Monday:{b:"Cereal",l:"Quesadillas"}, Tuesday:{b:"Oatmeal",l:"PB & J"},
  Wednesday:{b:"Frozen / Eggs & Toast",l:"Sandwich – meat, applesauce"},
  Thursday:{b:"Cereal",l:"Meat & Cheese"}, Friday:{b:"Oatmeal",l:"Grilled Cheese"},
  Saturday:{b:"Pancakes / Waffles or Muffins",l:"Leftovers"}, Sunday:{b:"Eggs & Toast",l:"Grilled Cheese"}
};
const THEME={Monday:"Breakfast for Dinner",Tuesday:"Global Night",Wednesday:"Easy / No-Fuss",
  Thursday:"Soup / Crockpot",Friday:"Fun Friday",Saturday:"Weekend",Sunday:"Weekend"};
const DINNER_OPTS={
  Monday:["Pancakes","Waffles","Breakfast Tacos","Biscuits and Gravy","Quiche","Breakfast Sandwich","Casserole"],
  Tuesday:["Tacos","Taco Dip Casserole","Quesadilla","Fajitas","Nachos"],
  Wednesday:["Pizza","Grilled Cheese","Burritos"],
  Thursday:["Swedish Meatballs","Tortellini Soup","Meatball Subs"],
  Friday:["Taco Pizza","Tater Tot Hotdish","Pot Pie","Homemade Pizza","Hawaiin Sliders"],
  Saturday:["Leftovers"],Sunday:["Leftovers"]
};
function mealRec(name,opts){
  opts=opts||{};
  return {id:uid(),name:name,ingredients:opts.ingredients||[],sides:opts.sides||[],
          recipe:opts.recipe||{type:"none"},notes:opts.notes||""};
}
function seedPlan(name){
  const weeks=[0,1,2,3].map(i=>{
    const days=DAYS.map(dn=>{
      const opts=DINNER_OPTS[dn];
      const dinner=mealRec(opts[i%opts.length]);
      if(opts.length>1)dinner.notes="Swap ideas: "+opts.join(", ");
      return {weekday:dn.toLowerCase(),themeLabel:THEME[dn],
        meals:{breakfast:mealRec(B_L[dn].b),lunch:mealRec(B_L[dn].l),dinner:dinner}};
    });
    return {id:uid(),index:i+1,label:null,days:days,dessert:null};
  });
  return {id:uid(),name:name,createdAt:nowISO(),updatedAt:nowISO(),currentWeek:0,weeks:weeks};
}
function freshState(){
  const p=seedPlan("My Plan");
  return {schemaVersion:SCHEMA,activePlanId:p.id,planOrder:[p.id],plans:{[p.id]:p},
          settings:{theme:"dark"}, groceryStatuses:{}, ui:{}};
}

/* ---- migration from Batch-0 app ---- */
function migrateOld(o){
  try{
    const order=o.order||Object.keys(o.plans);
    const plans={};const newOrder=[];
    order.forEach(oldId=>{
      const op=o.plans[oldId];if(!op)return;
      const weeks=(op.weeks||[]).map((w,i)=>{
        const days=DAYS.map(dn=>{
          const od=(w.days&&w.days[dn])||{};
          const conv=(m)=>{if(!m||!m.name)return null;
            let recipe={type:"none"};
            if(m.recipeType==="link"&&m.url)recipe={type:"link",url:m.url};
            else if(m.recipeType==="book"&&(m.book||m.page))recipe={type:"cookbook",bookTitle:m.book||"",page:m.page||""};
            return {id:uid(),name:m.name,ingredients:m.ingredients||[],sides:m.sides||[],recipe:recipe,notes:m.note||""};
          };
          return {weekday:dn.toLowerCase(),themeLabel:od.theme||null,
            meals:{breakfast:conv(od.breakfast),lunch:conv(od.lunch),dinner:conv(od.dinner)}};
        });
        let dessert=null;
        if(w.dessert&&w.dessert.name){dessert={id:uid(),name:w.dessert.name,ingredients:w.dessert.ingredients||[],
          sides:w.dessert.sides||[],recipe:{type:"none"},notes:w.dessert.note||""};}
        return {id:uid(),index:i+1,label:w.name&&w.name!=="Week "+(i+1)?w.name:null,days:days,dessert:dessert};
      });
      while(weeks.length<4)weeks.push(seedPlan("x").weeks[weeks.length]);
      const np={id:uid(),name:op.name||"My Plan",createdAt:nowISO(),updatedAt:nowISO(),
        currentWeek:(o.currentWeek!=null?o.currentWeek:0),weeks:weeks.slice(0,4)};
      plans[np.id]=np;newOrder.push(np.id);
    });
    if(!newOrder.length)return null;
    return {schemaVersion:SCHEMA,activePlanId:newOrder[0],planOrder:newOrder,plans:plans,
            settings:{theme:"dark"},groceryStatuses:{},ui:{}};
  }catch(e){return null;}
}

function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){const d=JSON.parse(raw);if(d&&d.plans){d.ui=d.ui||{};return d;}}
    const old=localStorage.getItem(OLD_KEY);
    if(old){const m=migrateOld(JSON.parse(old));if(m){return m;}}
  }catch(e){}
  return freshState();
}
let D=load();
function save(){try{localStorage.setItem(KEY,JSON.stringify(D));}catch(e){toast("Could not save — storage full?");}}
function plan(){return D.plans[D.activePlanId];}
function announce(msg){const l=document.getElementById('live');if(l)l.textContent=msg;}

/* ============ FOOD CATEGORY THUMBNAILS ============ */
const FOODICON={
  breakfast:'<ellipse cx="12" cy="13" rx="7.5" ry="6"/><circle cx="12" cy="12.5" r="2.6"/>',
  taco:'<path d="M3.5 16.5a8.5 8.5 0 0 1 17 0z"/><path d="M3.5 16.5h17"/><circle cx="9" cy="13.5" r=".5"/><circle cx="12" cy="12.5" r=".5"/><circle cx="15" cy="13.5" r=".5"/>',
  pizza:'<path d="M12 3.5 5 19.5l7-2.7 7 2.7z"/><circle cx="11" cy="10.5" r=".7"/><circle cx="13.5" cy="13" r=".7"/><circle cx="10.5" cy="14.5" r=".7"/>',
  pasta:'<path d="M4.5 11.5h15a7.5 7.5 0 0 1-15 0z"/><path d="M7.5 9c0-2.1 9-2.1 9 0"/>',
  soup:'<path d="M4.5 12.5h15a7.5 7.5 0 0 1-15 0z"/><path d="M9 5.5c0 1.2-1 1.2-1 2.4M12.5 5c0 1.2-1 1.2-1 2.4"/>',
  sandwich:'<rect x="3.5" y="6.5" width="17" height="11" rx="2.2"/><path d="M4 10h16M4 13.5h16"/>',
  salad:'<path d="M5 18.5C5 11 11.5 6 18.5 6 18.5 13.5 12.5 18.5 5 18.5z"/><path d="M12.5 11.5 8 16"/>',
  dessert:'<path d="M5 13h14l-1.4 6.5a1.4 1.4 0 0 1-1.4 1.1H7.8a1.4 1.4 0 0 1-1.4-1.1z"/><path d="M8 13a4 4 0 0 1 8 0"/><path d="M12 6v3"/>',
  leftovers:'<rect x="5" y="8.5" width="14" height="9.5" rx="1.8"/><path d="M4 8.5h16"/>',
  protein:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.4"/><path d="M12 4v3M12 17v3M4 12h3M17 12h3"/>',
  plate:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.4"/>'
};
const CATS=[
  ['dessert',['brownie',' cake','cookie','ice cream','pudding','cobbler','dessert','crumble','cupcake','cheesecake']],
  ['pizza',['pizza']],
  ['taco',['taco','burrito','quesadilla','fajita','nacho','enchilada','tostada']],
  ['soup',['soup','stew','chili','chowder','bisque']],
  ['pasta',['pasta','spaghetti','alfredo','lasagna','tortellini','tetrazzini',' mac','noodle','ziti','penne']],
  ['sandwich',['sandwich','sub ','burger','slider','grilled cheese','wrap','melt','pb & j','pb&j','hot dog','hotdog','sloppy']],
  ['breakfast',['pancake','waffle','egg','oatmeal','oats','cereal','quiche','biscuit','toast','breakfast','muffin','bagel']],
  ['salad',['salad','veggie','vegetable']],
  ['seafood',['salmon','fish','shrimp','tuna','cod','crab','tilapia']],
  ['chicken',['chicken','turkey','teriyaki']],
  ['beef',['beef','steak','meatball','meatloaf','pot roast','roast','hotdish','tater tot','pork','ham','sausage','sliders','pot pie']],
  ['leftovers',['leftover']]
];
const CAT_ICON={breakfast:'breakfast',taco:'taco',pizza:'pizza',pasta:'pasta',soup:'soup',sandwich:'sandwich',salad:'salad',dessert:'dessert',leftovers:'leftovers',seafood:'protein',chicken:'protein',beef:'protein',plate:'plate'};
function catOf(name){const s=' '+(name||'').toLowerCase()+' ';for(const [cat,kws] of CATS){for(const k of kws){if(s.indexOf(k)>=0)return cat;}}return 'plate';}
function catThumb(name,cls){const c=catOf(name);return `<span class="thumb ${cls||''} t-${c}">${svg(FOODICON[CAT_ICON[c]]||FOODICON.plate,'thumb-ic')}</span>`;}

/* ============ NAVIGATION ============ */
let TAB="today";
function nav(t){
  TAB=t;
  document.querySelectorAll('nav.tabs button').forEach(b=>b.removeAttribute('aria-current'));
  document.getElementById('nav-'+t).setAttribute('aria-current','page');
  if(t==='today'){ // reset to actual weekday within current week
    D.ui.todayW=plan().currentWeek||0;
    D.ui.todayD=(new Date().getDay()+6)%7;
  }
  if(t==='week'){ D.ui.planView='week'; if(D.ui.selW==null)D.ui.selW=plan().currentWeek||0; }
  if(t==='month'){ if(D.ui.selW==null)D.ui.selW=plan().currentWeek||0; }
  if(t==='grocery'){ D.groceryStatuses=D.groceryStatuses||{};
    if(D.ui.gScope==null)D.ui.gScope='week'; if(D.ui.gWeek==null)D.ui.gWeek=plan().currentWeek||0;
    if(D.ui.gFilter==null)D.ui.gFilter='all'; }
  render(); window.scrollTo(0,0);
}
function render(){
  renderPlanCtl();
  const v=document.getElementById('view');
  const tl=document.getElementById('topLeft');
  if(TAB==='today'){tl.className='brand';tl.innerHTML=LOGO_MARK+'<span>Plated</span>';v.innerHTML=viewToday();}
  else{tl.className='screen-title';
    tl.textContent=({week:'Week '+((D.ui.selW||0)+1),month:'Month Overview',grocery:'Groceries',more:'More'})[TAB];
    if(TAB==='week')v.innerHTML=viewPlan();
    else if(TAB==='month')v.innerHTML=viewMonth();
    else if(TAB==='grocery')v.innerHTML=viewGrocery();
    else v.innerHTML=viewMore();
  }
}
function renderPlanCtl(){
  const sel=document.getElementById('planCtl');
  sel.innerHTML=D.planOrder.map(id=>`<option value="${id}" ${id===D.activePlanId?'selected':''}>${esc(D.plans[id].name)}</option>`).join('');
  sel.style.display=(TAB==='today'||TAB==='week'||TAB==='grocery')?'':'none';
}
function onPlanCtl(v){D.activePlanId=v;D.ui.selW=plan().currentWeek||0;save();render();}
function stub(icon,title,msg){return `<div class="stub"><span class="big">${icon}</span><h3>${title}</h3><p>${msg}</p></div>`;}

/* ============ TODAY ============ */
function todayDay(){return plan().weeks[D.ui.todayW].days[D.ui.todayD];}
function viewToday(){
  const w=D.ui.todayW, di=D.ui.todayD, day=plan().weeks[w].days[di];
  const isNow=(w===(plan().currentWeek||0))&&(di===((new Date().getDay()+6)%7));
  const dObj=new Date();
  const dateStr=isNow?dObj.toLocaleDateString(undefined,{month:'long',day:'numeric',year:'numeric'}):('Week '+(w+1)+' template');
  let h=`<div class="today-head">
    <h1 class="today-weekday">${DAYS[di]}</h1>
    <p class="today-date">${dateStr}</p>
    ${day.themeLabel?`<span class="theme-tag">${esc(day.themeLabel)}</span>`:''}
  </div>
  <div class="context-row">
    <span class="wk">Week ${w+1} of 4 ${w===(plan().currentWeek||0)?'<span class="now">· Now</span>':''}</span>
    <span class="daynav">
      <button class="chevbtn" aria-label="Previous day" onclick="stepToday(-1)">‹</button>
      <button class="chevbtn" aria-label="Next day" onclick="stepToday(1)">›</button>
    </span>
  </div>
  <div class="stack">`;
  SLOTS.forEach(s=>{h+=mealRowToday(w,di,s,day.meals[s]);});
  h+=`</div>`;
  return h;
}
function mealRowToday(w,di,slot,m){
  const has=m&&m.name;
  return `<button class="meal-row" onclick="${has?`openDetail(${w},${di},'${slot}')`:`openEditor(${w},${di},'${slot}')`}">
    <span class="mr-txt">
      <span class="slot">${SLOT_LABEL[slot]}${has&&recipeGlyph(m)?' <span class="glyph">'+recipeGlyph(m)+'</span>':''}</span>
      <span class="name ${has?'':'empty'}">${has?esc(m.name):'Add meal'}</span>
    </span>
    ${has?catThumb(m.name):`<span class="add">${IC.plusC}</span>`}
  </button>`;
}
function recipeGlyph(m){if(!m.recipe)return '';if(m.recipe.type==='link')return IC.link;if(m.recipe.type==='cookbook')return IC.book;return '';}
function stepToday(dir){
  let d=D.ui.todayD+dir, w=D.ui.todayW;
  if(d>6){d=0;w=Math.min(3,w+1);} if(d<0){d=6;w=Math.max(0,w-1);}
  D.ui.todayD=d;D.ui.todayW=w;save();render();
}

/* ============ PLAN ============ */
function viewPlan(){
  if(D.ui.planView==='day')return viewDay();
  if(D.ui.planView==='month')return viewMonth();
  return viewWeek();
}
function viewWeek(){
  const w=D.ui.selW, wk=plan().weeks[w], cur=plan().currentWeek||0;
  let h=`<div class="wkpills" role="tablist" aria-label="Week">`;
  plan().weeks.forEach((_,i)=>{
    h+=`<button class="wkpill" aria-pressed="${i===w}" onclick="selWeek(${i})">Week ${i+1}${i===cur?'<span class="nowdot">Now</span>':''}</button>`;
  });
  h+=`</div>
  <div class="row-between" style="margin:4px 0 14px">
    <button class="btn ghost mini" onclick="setCurrentWeek(${w})">${w===cur?IC.check+' Current week':'Set as current'}</button>
    <button class="btn ghost mini" onclick="nav('month')">Four-week overview ›</button>
  </div>
  <p class="section-label">Dinners · tap a day for all meals</p>
  <div class="stack">`;
  DAYS.forEach((dn,di)=>{
    const day=wk.days[di], din=day.meals.dinner, has=din&&din.name;
    h+=`<button class="dayrow" onclick="openDay(${w},${di})">
      <span class="dow">${DAY_ABBR[dn]}</span>
      <span class="drow-name ${has?'':'add'}">${has?esc(din.name):'Add dinner'}</span>
      ${has?catThumb(din.name,'sm'):''}
      <span class="chev">${IC.chevR}</span>
    </button>`;
  });
  h+=`</div>
  <p class="section-label" style="margin-top:22px">Dessert</p>
  ${dessertCard(w)}`;
  return h;
}
function dessertCard(w){
  const m=plan().weeks[w].dessert, has=m&&m.name;
  return `<div class="dessert-card" onclick="openDessert(${w})">
    <span class="lab">${IC.dessert} Once this week</span>
    <div class="nm ${has?'':'empty'}">${has?esc(m.name):'Add a weekly dessert'}</div>
  </div>`;
}
function selWeek(i){D.ui.selW=i;render();}
function setCurrentWeek(i){plan().currentWeek=i;plan().updatedAt=nowISO();save();render();toast('Current week set to Week '+(i+1));}

function viewDay(){
  const w=D.ui.selW, di=D.ui.dayD, wk=plan().weeks[w], day=wk.days[di];
  let h=`<button class="btn ghost mini" onclick="D.ui.planView='week';render()">‹ Week ${w+1}</button>
  <h1 class="today-weekday" style="font-size:30px;margin:16px 0 2px">${DAYS[di]}</h1>
  <p class="today-date">Week ${w+1} template</p>
  <div class="context-row">
    <button class="btn ghost mini" onclick="editDayLabel(${w},${di})">${IC.pencil} ${day.themeLabel?esc(day.themeLabel):'Add day label'}</button>
    <span class="daynav">
      <button class="chevbtn" aria-label="Previous day" onclick="stepDay(-1)">‹</button>
      <button class="chevbtn" aria-label="Next day" onclick="stepDay(1)">›</button>
    </span>
  </div>
  <div class="stack">`;
  SLOTS.forEach(s=>{h+=mealRowPlan(w,di,s,day.meals[s]);});
  h+=`</div>
  <div class="stack" style="margin-top:14px">
    <button class="info-card" onclick="openNote(${w},${di})">
      <span class="lab">${IC.note} Note</span>
      <div class="nm ${day.note?'':'empty'}">${day.note?esc(day.note):'Add a note for this day'}</div>
    </button>
    <button class="btn ghost" onclick="openSwap(${w},${di})">${IC.swap} Swap this day with another</button>
  </div>`;
  return h;
}
function mealRowPlan(w,di,slot,m){
  const has=m&&m.name;

function openDay(w,di){D.ui.selW=w;D.ui.dayD=di;D.ui.planView='day';gotoWeekTab();render();window.scrollTo(0,0);}
function openDayFromMonth(w,di){openDay(w,di);}
function stepDay(dir){let d=D.ui.dayD+dir;if(d>6)d=0;if(d<0)d=6;D.ui.dayD=d;render();}
function editDayLabel(w,di){

/* ============ MEAL DETAIL + EDITOR (full-screen panel) ============ */
let panelMode=null;      // 'detail' | 'editor'
let panelRef=null;       // {w, di, slot} or {w, dessert:true}
let editRType='none';

function refMeal(ref){
  if(ref.dessert)return plan().weeks[ref.w].dessert;
  return plan().weeks[ref.w].days[ref.di].meals[ref.slot];
}
function refCtx(ref){
  if(ref.dessert)return 'Weekly dessert · Week '+(ref.w+1);
  return SLOT_LABEL[ref.slot]+' · '+DAYS[ref.di]+' · Week '+(ref.w+1);
}
function showPanel(){document.getElementById('panel').classList.add('show');document.body.style.overflow='hidden';}
function closePanel(){document.getElementById('panel').classList.remove('show');document.body.style.overflow='';panelMode=null;}

function openDetail(w,di,slot){panelRef={w,di,slot};renderDetail();}
function openDessert(w){
  const m=plan().weeks[w].dessert;
  if(m&&m.name){panelRef={w,dessert:true};renderDetail();}
  else{panelRef={w,dessert:true};openEditorRef();}
}
function openEditor(w,di,slot){panelRef={w,di,slot};openEditorRef();}

function heroBanner(name){const c=catOf(name);return `<div class="hero t-${c}">${svg(FOODICON[CAT_ICON[c]]||FOODICON.plate,'hero-ic')}</div>`;}
function renderDetail(){
  panelMode='detail';
  const m=refMeal(panelRef);
  document.getElementById('panelTitle').textContent=m.name;
  document.getElementById('panelBack').textContent='‹ Back';
  const act=document.getElementById('panelAction');act.textContent='';act.style.visibility='hidden';
  let h=heroBanner(m.name);
  h+=`<h1 class="detail-title">${esc(m.name)}</h1><p class="detail-ctx">${refCtx(panelRef)}</p>`;
  if(m.ingredients&&m.ingredients.length){
    h+=`<div class="detail-sec"><h4>Ingredients</h4><ul class="bullets">${m.ingredients.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`;
  }
  h+=`<div class="detail-sec"><h4>Sides</h4><div class="side-chips">
    ${(m.sides||[]).map(s=>`<span class="chip side">${esc(s)}</span>`).join('')}
    <button class="chip side add" onclick="openEditorRef()" aria-label="Add or edit sides">${IC.plus}</button>
  </div></div>`;
  h+=`<div class="detail-sec"><h4>Recipe</h4>`;
  if(m.recipe&&m.recipe.type==='link'&&m.recipe.url)
    h+=`<a class="recipe-row" href="${esc(m.recipe.url)}" target="_blank" rel="noopener noreferrer">${IC.link}<span class="rr-main">Open recipe</span>${IC.chevR}</a>`;
  else if(m.recipe&&m.recipe.type==='cookbook')
    h+=`<button class="recipe-row" onclick="openEditorRef()">${IC.book}<span class="rr-main">${esc(m.recipe.bookTitle||'')}${m.recipe.volume?', '+esc(m.recipe.volume):''}</span>${m.recipe.page?`<span class="rr-pg">p. ${esc(m.recipe.page)}</span>`:''}${IC.chevR}</button>`;
  else
    h+=`<button class="recipe-row add" onclick="openEditorRef()">${IC.plus}<span class="rr-main">Add a link or cookbook page</span></button>`;
  h+=`</div>`;
  if(m.notes)h+=`<div class="detail-sec"><h4>Notes</h4><div class="notes-box">${esc(m.notes)}</div></div>`;
  h+=`<div style="margin-top:28px"><button class="btn" onclick="openEditorRef()">Edit meal</button></div>`;
  document.getElementById('panelBody').innerHTML=h;
  document.getElementById('panelBody').scrollTop=0;
  showPanel();
}

    <label class="fl" for="f_name">${isDes?'Dessert name':'Meal name'} *</label>
    <input class="inp" id="f_name" value="${esc(nm)}" placeholder="${isDes?'e.g. Brownies':'e.g. Chicken fajitas'}" autocomplete="off">
    <div class="field-err" id="err_name">Please enter a name.</div>

    <label class="fl" for="f_ing">Ingredients</label>
    <textarea class="inp" id="f_ing" placeholder="One per line">${esc(ing.join('\n'))}</textarea>
    <p class="fhint">One item per line. These flow into your grocery list.</p>

    <label class="fl" for="f_side">Sides</label>
    <textarea class="inp" id="f_side" placeholder="One per line, e.g. rice">${esc(sides.join('\n'))}</textarea>
    <p class="fhint">Also added to the grocery list; shown in amber on the meal.</p>

    <label class="fl">Recipe</label>
    <div class="seg" role="group" aria-label="Recipe type">
      <button type="button" data-t="none" aria-pressed="${editRType==='none'}" onclick="pickR('none')">None</button>
      <button type="button" data-t="link" aria-pressed="${editRType==='link'}" onclick="pickR('link')">${IC.link} Link</button>
      <button type="button" data-t="cookbook" aria-pressed="${editRType==='cookbook'}" onclick="pickR('cookbook')">${IC.book} Cookbook</button>
    </div>
    <div id="r_link" style="display:${editRType==='link'?'block':'none'}">
      <label class="fl" for="f_url">Recipe URL</label>
      <input class="inp" id="f_url" value="${esc(rec.url||'')}" placeholder="https://…" inputmode="url">
      <div class="field-err" id="err_url">Enter a valid http(s) link.</div>
    </div>
    <div id="r_book" style="display:${editRType==='cookbook'?'block':'none'}">
      <label class="fl" for="f_book">Cookbook title *</label>
      <input class="inp" id="f_book" value="${esc(rec.bookTitle||'')}" placeholder="e.g. Magnolia Table">
      <label class="fl" for="f_vol">Volume (optional)</label>
      <input class="inp" id="f_vol" value="${esc(rec.volume||'')}" placeholder="e.g. Vol. 2">
      <label class="fl" for="f_page">Page (optional)</label>
      <input class="inp" id="f_page" value="${esc(rec.page||'')}" placeholder="e.g. 142–145">
      <div class="field-err" id="err_book">Enter the cookbook title.</div>
    </div>

    <label class="fl" for="f_notes">Notes</label>
    <textarea class="inp" id="f_notes" placeholder="Anything to remember">${esc(notes)}</textarea>

    <div class="editor-actions">
      <button class="btn" onclick="saveEditor()">Save ${isDes?'dessert':'meal'}</button>
      ${m?`<button class="btn danger" onclick="deleteMeal()">Delete ${isDes?'dessert':'meal'}</button>`:''}
    </div>
  `;
  showPanel();
}
function pickR(t){editRType=t;
  document.querySelectorAll('.seg button').forEach(b=>b.setAttribute('aria-pressed',b.dataset.t===t));
  document.getElementById('r_link').style.display=t==='link'?'block':'none';
  document.getElementById('r_book').style.display=t==='cookbook'?'block':'none';
}
function splitLines(v){return v.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);}
function saveEditor(){
  const name=document.getElementById('f_name').value.trim();
  let ok=true;
  const errN=document.getElementById('err_name');
  if(!name){errN.classList.add('show');ok=false;}else{errN.classList.remove('show');}
  let recipe={type:'none'};
  if(editRType==='link'){
    const url=document.getElementById('f_url').value.trim();
    const errU=document.getElementById('err_url');
    if(url&&!/^https?:\/\//i.test(url)){errU.classList.add('show');ok=false;}else{errU.classList.remove('show');}
    if(url)recipe={type:'link',url:url};
  }else if(editRType==='cookbook'){
    const book=document.getElementById('f_book').value.trim();
    const errB=document.getElementById('err_book');
    if(!book){errB.classList.add('show');ok=false;}else{errB.classList.remove('show');}
    recipe={type:'cookbook',bookTitle:book,volume:document.getElementById('f_vol').value.trim(),page:document.getElementById('f_page').value.trim()};
  }
  if(!ok){document.getElementById('f_name').focus();return;}
  const data={name:name,ingredients:splitLines(document.getElementById('f_ing').value),
    sides:splitLines(document.getElementById('f_side').value),recipe:recipe,
    notes:document.getElementById('f_notes').value.trim()};
  let m=refMeal(panelRef);
  if(m){Object.assign(m,data);}
  else{m={id:uid(),...data};
    if(panelRef.dessert)plan().weeks[panelRef.w].dessert=m;
    else plan().weeks[panelRef.w].days[panelRef.di].meals[panelRef.slot]=m;}
  plan().updatedAt=nowISO();save();
  announce('Saved '+name);
  panelRef=panelRef; renderDetail(); render(); toast('Saved');
}
function deleteMeal(){
  const m=refMeal(panelRef);
  if(!confirm('Delete "'+(m?m.name:'this meal')+'"?'))return;
  if(panelRef.dessert)plan().weeks[panelRef.w].dessert=null;
  else plan().weeks[panelRef.w].days[panelRef.di].meals[panelRef.slot]=null;
  plan().updatedAt=nowISO();save();closePanel();render();toast('Deleted');
}
function panelActionClick(){if(panelMode==='detail')openEditorRef();else if(panelMode==='editor')saveEditor();}

/* ============ GROCERY ============ */
let GORDER=[];
function gScopeKey(){return plan().id+':'+(D.ui.gScope==='all'?'all':'w'+D.ui.gWeek);}
function gWeeks(){return D.ui.gScope==='all'?plan().weeks:[plan().weeks[D.ui.gWeek]];}
function normKey(s){return String(s).normalize('NFKC').toLowerCase().replace(/\s+/g,' ').trim().replace(/[.,;:]+$/,'').trim();}
function collect(weeks){
  const map={};
  const push=(m)=>{
    if(!m||!m.name)return;
    [...(m.ingredients||[]),...(m.sides||[])].forEach(raw=>{
      const disp=(raw||'').trim(); if(!disp)return;
      const k=normKey(disp); if(!k)return;
      if(!map[k])map[k]={name:disp,count:0,uses:[]};
      map[k].count++;
      if(map[k].uses.indexOf(m.name)<0)map[k].uses.push(m.name);
    });
  };
  weeks.forEach(w=>{ w.days.forEach(d=>SLOTS.forEach(s=>push(d.meals[s]))); push(w.dessert); });
  return map;
}
function gStatus(k){const sc=D.groceryStatuses[gScopeKey()];return sc&&sc[k]?sc[k].state:'';}
function gSet(idx,state){
  const k=GORDER[idx]; if(k==null)return;
  const sk=gScopeKey(); if(!D.groceryStatuses[sk])D.groceryStatuses[sk]={};
  const cur=D.groceryStatuses[sk][k]?D.groceryStatuses[sk][k].state:'';
  if(cur===state){delete D.groceryStatuses[sk][k];announce('Cleared');}
  else{D.groceryStatuses[sk][k]={state:state,updatedAt:nowISO()};announce(state==='got'?'Marked got':(state==='out'?'Marked out':'Marked low'));}
  save();render();
}
function gCycle(idx){
  const k=GORDER[idx]; if(k==null)return;
  const order=['','out','low','got'];
  const next=order[(order.indexOf(gStatus(k))+1)%order.length];
  const sk=gScopeKey(); if(!D.groceryStatuses[sk])D.groceryStatuses[sk]={};
  if(next==='')delete D.groceryStatuses[sk][k];
  else D.groceryStatuses[sk][k]={state:next,updatedAt:nowISO()};
  announce(next===''?'Cleared':('Marked '+next));
  save();render();
}
function gScopeSet(s){D.ui.gScope=s;save();render();}
function gWeekSet(i){D.ui.gWeek=i;save();render();}
function gFilterSet(f){D.ui.gFilter=f;render();}
function gReset(){if(confirm('Reset all Out / Low / Got marks for this list?')){delete D.groceryStatuses[gScopeKey()];save();render();toast('Statuses reset');}}

function viewGrocery(){
  const map=collect(gWeeks());
  const keys=Object.keys(map).sort((a,b)=>map[a].name.localeCompare(map[b].name,undefined,{sensitivity:'base'}));
  GORDER=keys;
  const idxOf={};keys.forEach((k,i)=>idxOf[k]=i);

  let h=`<div class="seg" role="group" aria-label="Grocery scope">
    <button type="button" aria-pressed="${D.ui.gScope==='week'}" onclick="gScopeSet('week')">This week</button>
    <button type="button" aria-pressed="${D.ui.gScope==='all'}" onclick="gScopeSet('all')">All 4 weeks</button>
  </div>`;
  if(D.ui.gScope==='week'){
    h+=`<div class="wkpills" style="margin-top:12px">`;
    plan().weeks.forEach((_,i)=>{h+=`<button class="wkpill" aria-pressed="${i===D.ui.gWeek}" onclick="gWeekSet(${i})">Week ${i+1}${i===(plan().currentWeek||0)?'<span class="nowdot">Now</span>':''}</button>`;});
    h+=`</div>`;
  }
  if(!keys.length){
    return h+`<div class="empty-state"><span class="big">${IC.basket}</span>No ingredients in this scope yet.<br>Add ingredients to your meals and the list builds itself.</div>`;
  }
  const active=keys.filter(k=>gStatus(k)!=='got');
  const got=keys.filter(k=>gStatus(k)==='got');
  h+=`<div class="row-between" style="margin:16px 0 12px">
    <span class="muted" style="font-size:13px">${keys.length} item${keys.length!==1?'s':''} · <strong style="color:var(--text)">${active.length}</strong> still to buy</span>
    <button class="btn ghost mini" onclick="gReset()">Reset</button>
  </div>
  <div class="gfilter" role="group" aria-label="Filter">
    ${['all','buy','got'].map(f=>`<button class="fchip" type="button" aria-pressed="${D.ui.gFilter===f}" onclick="gFilterSet('${f}')">${({all:'All',buy:'To buy',got:'Got'})[f]}</button>`).join('')}
  </div>`;

  let list='';
  if(D.ui.gFilter==='got'){
    list = got.length ? got.map(k=>gItem(k,map[k],idxOf[k])).join('') : `<p class="muted" style="padding:24px 0;text-align:center">Nothing marked Got yet.</p>`;
  }else{
    list = active.length ? active.map(k=>gItem(k,map[k],idxOf[k])).join('') : `<p class="muted" style="padding:16px 0;text-align:center">Everything's marked Got.</p>`;
    if(D.ui.gFilter==='all'&&got.length){
      list += `<div class="completed-h">Completed · ${got.length}</div>`;
      list += got.map(k=>gItem(k,map[k],idxOf[k])).join('');
    }
  }
  h+=`<div class="glist">${list}</div>`;
  return h;
}
function gItem(k,it,idx){
  const st=gStatus(k);
  const uses=it.uses.length?`<span class="used">Used in ${esc(it.uses.join(', '))}</span>`:'';
  return `<div class="gitem ${st==='got'?'got':''}">
    <div class="ginfo" onclick="gCycle(${idx})">
      <span class="gname">${st==='got'?'<span class="ck">'+IC.check+'</span>':''}${esc(it.name)}${it.count>1?` <span class="cnt">×${it.count}</span>`:''}</span>
      ${uses}
    </div>
    <div class="gstat" role="group" aria-label="Status">
      <button class="sb out ${st==='out'?'on':''}" type="button" aria-pressed="${st==='out'}" onclick="gSet(${idx},'out')">Out</button>
      <button class="sb low ${st==='low'?'on':''}" type="button" aria-pressed="${st==='low'}" onclick="gSet(${idx},'low')">Low</button>
      <button class="sb got ${st==='got'?'on':''}" type="button" aria-pressed="${st==='got'}" onclick="gSet(${idx},'got')">Got</button>
    </div>
  </div>`;
}

/* ============ MORE: plans, backup, about ============ */
function countFilled(p){let n=0;p.weeks.forEach(w=>w.days.forEach(d=>SLOTS.forEach(s=>{if(d.meals[s]&&d.meals[s].name)n++;})));return n;}
function blankPlanNew(name){
  const weeks=[0,1,2,3].map(i=>({id:uid(),index:i+1,label:null,
    days:DAYS.map(dn=>({weekday:dn.toLowerCase(),themeLabel:THEME[dn],meals:{breakfast:null,lunch:null,dinner:null}})),
    dessert:null}));
  return {id:uid(),name:name,createdAt:nowISO(),updatedAt:nowISO(),currentWeek:0,weeks:weeks};
}
function viewMore(){
  let h=`<p class="section-label">Plans</p><div class="stack">`;
  D.planOrder.forEach(id=>{
    const p=D.plans[id], act=id===D.activePlanId;

      <div class="row-between">

        </div>

        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">

        ${D.planOrder.length>1?`<button class="btn danger mini" onclick="deletePlan('${id}')">Delete</button>`:''}
      </div>
    </div>`;
  });
  h+=`</div>
  <div style="display:flex;gap:8px;margin-top:12px">
    <button class="btn ghost mini" onclick="createPlan()">${IC.plus} New plan</button>
    <button class="btn ghost mini" onclick="duplicatePlan()">${IC.copy} Duplicate active</button>
  </div>

  <p class="section-label" style="margin-top:30px">Backup</p>
  <div class="card" style="padding:16px">
    <p class="muted" style="margin:0 0 12px;font-size:13px">Save a copy of everything, or restore from a file. A safety backup downloads automatically before any import replaces your data.</p>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn" onclick="exportBackup()">${IC.down} Export backup (.json)</button>
      <label class="btn ghost" style="text-align:center;cursor:pointer;display:block">${IC.up} Import backup…
        <input type="file" accept="application/json,.json" style="display:none" onchange="importFile(this)">
      </label>
    </div>
  </div>

  <p class="section-label" style="margin-top:30px">About</p>

    <p class="muted" style="margin:0 0 10px;font-size:12px">Plated · v1.0 · local-first PWA</p>
    <div class="buildtag">Build <strong>${BUILD}</strong> · ${BUILD_DATE}</div>
  </div>`;
  return h;
}
function setActivePlan(id){D.activePlanId=id;D.ui.selW=plan().currentWeek||0;save();render();toast('Switched to '+D.plans[id].name);}
function createPlan(){const n=prompt('Name this plan (e.g. Summer, Winter):');if(n===null)return;const nm=n.trim().slice(0,50);if(!nm)return;const p=blankPlanNew(nm);D.plans[p.id]=p;D.planOrder.push(p.id);D.activePlanId=p.id;D.ui.selW=0;save();render();toast('Plan created');}
function duplicatePlan(){const copy=JSON.parse(JSON.stringify(plan()));copy.id=uid();copy.name=(plan().name+' (copy)').slice(0,50);copy.createdAt=nowISO();copy.updatedAt=nowISO();D.plans[copy.id]=copy;D.planOrder.push(copy.id);D.activePlanId=copy.id;D.ui.selW=copy.currentWeek||0;save();render();toast('Plan duplicated');}
function renamePlan(id){const p=D.plans[id];const n=prompt('Rename plan:',p.name);if(n===null)return;const nm=n.trim().slice(0,50);if(!nm)return;p.name=nm;p.updatedAt=nowISO();save();render();}
function deletePlan(id){const p=D.plans[id];if(!confirm('Delete plan "'+p.name+'"? This cannot be undone.'))return;delete D.plans[id];D.planOrder=D.planOrder.filter(x=>x!==id);if(!D.planOrder.length){const np=seedPlan('My Plan');D.plans[np.id]=np;D.planOrder=[np.id];}if(D.activePlanId===id)D.activePlanId=D.planOrder[0];D.ui.selW=plan().currentWeek||0;save();render();toast('Plan deleted');}
function seedInto(id){if(!confirm('Load the starter meals into "'+D.plans[id].name+'"? This replaces the meals in this plan.'))return;const nm=D.plans[id].name;const cw=D.plans[id].currentWeek||0;const sp=seedPlan(nm);sp.id=id;sp.currentWeek=cw;D.plans[id]=sp;save();render();toast('Starter meals loaded');}

function download(filename,text){
  const blob=new Blob([text],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},120);
}
function exportBackup(){
  const data=Object.assign({},D,{exportedAt:nowISO()});delete data.ui;
  download('plated-backup-'+new Date().toISOString().slice(0,10)+'.json',JSON.stringify(data,null,2));
  toast('Backup downloaded');
}
function validateBackup(d){
  if(typeof d!=='object'||!d)return 'File is not a Plated backup.';
  if(!d.plans||typeof d.plans!=='object')return 'No plans found in the file.';
  if(!Array.isArray(d.planOrder)||!d.planOrder.length)return 'Backup has no plan list.';
  for(const id of d.planOrder){const p=d.plans[id];if(!p)return 'A plan referenced in the list is missing.';
    if(!Array.isArray(p.weeks)||p.weeks.length!==4)return 'A plan does not have exactly four weeks.';}
  return null;
}
function importFile(input){
  const file=input.files&&input.files[0];if(!file){return;}
  const reader=new FileReader();
  reader.onload=()=>{
    let parsed;
    try{parsed=JSON.parse(reader.result);}catch(e){alert('That file is not valid JSON — no changes made.');return;}
    const err=validateBackup(parsed);
    if(err){alert('Import canceled: '+err+'\nNo changes were made.');return;}
    if(!confirm('Replace ALL current data with this backup? Your current plans will be overwritten.')){return;}
    try{exportBackup();}catch(e){}
    parsed.schemaVersion=SCHEMA;
    parsed.settings=parsed.settings||{theme:'dark'};
    parsed.groceryStatuses=parsed.groceryStatuses||{};
    if(!parsed.activePlanId||!parsed.plans[parsed.activePlanId])parsed.activePlanId=parsed.planOrder[0];
    parsed.ui={};delete parsed.exportedAt;
    D=parsed;save();nav('today');toast('Backup restored');
  };
  reader.onerror=()=>alert('Could not read that file.');
  reader.readAsText(file);
  input.value='';
}

/* ============ MODAL (note + swap) ============ */
function openModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modalWrap').classList.add('show');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modalWrap').classList.remove('show');document.body.style.overflow='';}
function openNote(w,di){
  const day=plan().weeks[w].days[di];
  openModal(`<h3>Note · ${DAYS[di]}</h3><p class="msub">Just for this day, Week ${w+1}.</p>
    <textarea class="inp" id="note_ta" style="min-height:120px" placeholder="e.g. Practice night — keep it quick.">${esc(day.note||'')}</textarea>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveNote(${w},${di})">Save note</button>
    </div>`);
  setTimeout(()=>{const t=document.getElementById('note_ta');if(t)t.focus();},60);
}
function saveNote(w,di){plan().weeks[w].days[di].note=document.getElementById('note_ta').value.trim();plan().updatedAt=nowISO();save();closeModal();render();toast('Note saved');}
function openSwap(w,di){
  let rows='';
  DAYS.forEach((dn,j)=>{ if(j===di)return;
    const din=plan().weeks[w].days[j].meals.dinner;
    rows+=`<button class="swap-day" onclick="doSwap(${w},${di},${j})"><span>${dn}</span><span class="sd-name">${din&&din.name?esc(din.name):'—'}</span></button>`;
  });
  openModal(`<h3>Swap ${DAYS[di]} with…</h3><p class="msub">Trades all meals (and note) between the two days in Week ${w+1}.</p>${rows}
    <button class="btn ghost" style="margin-top:6px" onclick="closeModal()">Cancel</button>`);
}
function doSwap(w,a,b){
  const A=plan().weeks[w].days[a], B=plan().weeks[w].days[b];
  const t={meals:A.meals,themeLabel:A.themeLabel,note:A.note};
  A.meals=B.meals;A.themeLabel=B.themeLabel;A.note=B.note;
  B.meals=t.meals;B.themeLabel=t.themeLabel;B.note=t.note;
  plan().updatedAt=nowISO();save();closeModal();render();toast(DAYS[a]+' and '+DAYS[b]+' swapped');
}

/* ============ UTIL ============ */
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1600);}

/* init */
D.ui.todayW=plan().currentWeek||0;
D.ui.todayD=(new Date().getDay()+6)%7;
D.ui.selW=plan().currentWeek||0;
D.ui.planView='week';
save();
render();

if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});
}
</script>
